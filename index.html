<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta http-equiv="refresh" content="0; url=politica-privacidade.html">
    <title>TAC Inova — Metas e Planos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .logo {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .logo span { color: #f97316; }
        .sub {

            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 320px;
        }
        a {
            display: block;
            padding: 14px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
        .btn-primary {
            background: #f97316;
            color: #fff;
        }
        .btn-secondary {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
        }
        .footer {
            margin-top: 48px;
            font-size: 12px;
            color: #444;
        }
        .footer a { color: #f97316; text-decoration: none; }
